spring:
  application:
    name: vyanix-webservice
  datasource:
#    url: ${SPRING_DATASOURCE_URL}
#    username: ${SPRING_DATASOURCE_USERNAME}
#    password: ${SPRING_DATASOURCE_PASSWORD}
    url: jdbc:postgresql://localhost:5432/
    username: postgres
    password: KeepassXC#123
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        prepareThreshold: 0
        preferQueryMode: simple


  # Flyway migration configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate # Changed from 'update' to 'validate' - Flyway handles schema migrations
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        id:
          new_generator_mappings: true
    open-in-view: false
    show-sql: false

  # Redis configuration for token blocklist
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  # Access token: 15 minutes (short-lived for security)
  expiration-ms: ${JWT_EXPIRATION_MS:900000}
  # Refresh token sliding window: 7 days
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  # Refresh token inactivity timeout: 30 days
  refresh-inactivity-timeout-ms: ${JWT_REFRESH_INACTIVITY_TIMEOUT_MS:2592000000}
  # Refresh token max lifetime: 90 days
  refresh-max-lifetime-ms: ${JWT_REFRESH_MAX_LIFETIME_MS:7776000000}

# Application Security Configuration
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:9002}
  # Migration Configuration
  # Set to 'true' after 30-day migration period to enable legacy token cleanup
  migration:
    legacy-token-migration-ended: false  # Change to true after migration period

  security:
    # CRITICAL: Token blocklist enabled by default
    # Disable ONLY for low-risk applications where 15-min revocation window is acceptable
    # WARNING: Disabling creates a security gap - revoked access tokens remain valid until expiration
    enable-token-blocklist: ${ENABLE_TOKEN_BLOCKLIST:true}
    
    # Blocklist TTL: should match access token lifetime (15 minutes)
    token-blocklist-ttl-seconds: 900
    
    # SHA-256 pepper for refresh token hashing
    # Must be at least 32 characters for adequate security
    # Store in environment variable, NEVER in source code
    refresh-token-pepper: ${REFRESH_TOKEN_PEPPER:}
    
    # Maximum concurrent sessions per user
    max-concurrent-sessions: ${MAX_CONCURRENT_SESSIONS:5}
    
    # Grace period for token rotation (prevents race conditions)
    grace-period-seconds: ${GRACE_PERIOD_SECONDS:30}

  # Rate Limiting Configuration
  ratelimit:
    # Enable/disable rate limiting (for emergency disable)
    enabled: ${RATE_LIMIT_ENABLED:true}
    
    # Per-IP limit: prevents distributed attacks
    refresh-per-ip-limit: ${REFRESH_PER_IP_LIMIT:10}
    refresh-per-ip-window: ${REFRESH_PER_IP_WINDOW:60}
    
    # Per-User limit: 12/min with 3-token burst bucket
    # Burst allows: 3 simultaneous tab refreshes + 9 regular refreshes
    refresh-per-user-limit: ${REFRESH_PER_USER_LIMIT:12}
    refresh-per-user-window: ${REFRESH_PER_USER_WINDOW:60}
    refresh-per-user-burst: ${REFRESH_PER_USER_BURST:3}

# Logging Configuration
logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%X{requestId:-N/A}] --- [%15.15t] %-40.40logger{39} : %m%n%wEx"
  level:
    # Security logging
    in.vyanix.webservice.security: DEBUG
    in.vyanix.webservice.service: DEBUG
    # Rate limiting logging
    in.vyanix.webservice.config: INFO

# Spring Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: "health,info,migration"
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      enabled: true



