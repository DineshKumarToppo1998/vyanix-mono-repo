services:
  # Frontend - Next.js application (internal only, accessed via nginx)
  frontend:
    build:
      context: ./frontend/Vyanix-React
      args:
        - NEXT_PUBLIC_API_BASE_URL=/api/v1  # Relative URL - browser routes through Nginx
    container_name: ecommerce_frontend
    expose:
      - "3000"  # Internal only - not published to host
    environment:
      - INTERNAL_API_BASE_URL=http://backend:8080/api/v1  # SSR uses internal Docker hostname
      - HOSTNAME=0.0.0.0
      - PORT=3000
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend - Spring Boot application (internal only, accessed via nginx)
  backend:
    build: ./backend/vyanix-webservice
    container_name: ecommerce_backend
    expose:
      - "8080"  # Internal only - not published to host
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_TOKEN_PEPPER=${REFRESH_TOKEN_PEPPER}
      - REDIS_HOST=redis
      - MEILI_HOST=http://meilisearch:7700
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS}
    depends_on:
      redis:
        condition: service_started
      meilisearch:
        condition: service_started
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Nginx - Reverse proxy (ONLY service exposed to host)
  nginx:
    build: ./nginx
    container_name: ecommerce_nginx
    environment:
      - SERVER_NAME=${SERVER_NAME:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_certs:/etc/nginx/certs  # persisted so Let's Encrypt certs survive restarts
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Redis - Cache and session storage (internal only)
  redis:
    image: redis:7
    container_name: ecommerce_redis
    expose:
      - "6379"  # Internal only
    restart: always

  # Meilisearch - Search engine (internal only)
  meilisearch:
    image: getmeili/meilisearch
    container_name: ecommerce_meilisearch
    expose:
      - "7700"  # Internal only
    environment:
      - MEILI_NO_ANALYTICS=true
    volumes:
      - ./data/meilisearch:/meili_data
    restart: always

# Docker network configuration
# All services are on the default bridge network and can communicate by service name
networks:
  default:
    driver: bridge

volumes:
  nginx_certs:  # TLS certs — auto-generated self-signed on first start, replace with Let's Encrypt
