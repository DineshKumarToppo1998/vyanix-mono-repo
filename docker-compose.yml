services:
  # Frontend - Next.js application (internal only, accessed via nginx)
  frontend:
    build:
      context: ./frontend/Vyanix-React
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://backend:8080/api  # Internal Docker URL for SSR
    container_name: ecommerce_frontend
    expose:
      - "3000"  # Internal only - not published to host
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Backend - Spring Boot application (internal only, accessed via nginx)
  backend:
    build: ./backend/vyanix-webservice
    container_name: ecommerce_backend
    expose:
      - "8080"  # Internal only - not published to host
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres
      - SPRING_DATASOURCE_USERNAME=postgres.pktrqykpjbwxbadgceor
      - SPRING_DATASOURCE_PASSWORD=Supabase#Vyanix@2026
      - REDIS_HOST=redis
      - MEILI_HOST=http://meilisearch:7700
      - APP_CORS_ALLOWED_ORIGINS=http://localhost,http://localhost:3000,http://localhost:9002
    depends_on:
      redis:
        condition: service_started
      meilisearch:
        condition: service_started
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Nginx - Reverse proxy (ONLY service exposed to host)
  nginx:
    image: nginx:latest
    container_name: ecommerce_nginx
    ports:
      - "80:80"  # ONLY nginx is exposed to the host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Redis - Cache and session storage (internal only)
  redis:
    image: redis:7
    container_name: ecommerce_redis
    expose:
      - "6379"  # Internal only
    restart: always

  # Meilisearch - Search engine (internal only)
  meilisearch:
    image: getmeili/meilisearch
    container_name: ecommerce_meilisearch
    expose:
      - "7700"  # Internal only
    environment:
      - MEILI_NO_ANALYTICS=true
    volumes:
      - ./data/meilisearch:/meili_data
    restart: always

# Docker network configuration
# All services are on the default bridge network and can communicate by service name
networks:
  default:
    driver: bridge
